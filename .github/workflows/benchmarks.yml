name: Continuous Benchmarking

on:
  push:
    branches:
      - main
    # Dashboard-only changes are deployed by deploy-dashboard.yml; re-measuring nothing helps
    # no one.
    paths-ignore:
      - 'benchmark-dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  # Manual runs against any branch (pick the branch in the Run workflow dropdown): the pre-merge
  # "see the numbers first" path. Bencher files results under the actual branch name, so feature
  # runs never pollute main's history (Bencher handles feature-branch baselines natively).
  workflow_dispatch:

# Ensure only one benchmark PUBLISH at a time to prevent gh-pages conflicts (the matrix legs
# are safely concurrent; only the publish job touches gh-pages).
concurrency:
  group: benchmarks
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write

jobs:
  # One leg per family, in parallel. Every benchmark class carries exactly one family tag
  # (its first BenchmarkCategory value), so the legs partition the suite by construction --
  # no cross-leg tag bookkeeping. IMPORTANT: benchmarks that must be COMPARED to each other
  # (the AsyncOverhead sync/async pairs especially) live in the SAME family and therefore the
  # same leg -- same-run ratios are the only trustworthy numbers on shared runners; splitting a
  # comparison across runners would compare two different machines.
  run:
    name: Run ${{ matrix.category }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: [Traversal, VisitStream, Query, Streaming, Merge, Buffer, Aggregate, Serialization, DataStructures, FlatDecode, AsyncOverhead]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Copse.sln

      - name: Build benchmarks
        run: dotnet build src/Copse.Benchmarks/Copse.Benchmarks.csproj -c Release --no-restore

      # Shared runners are a CPU lottery (EPYC 7763 / EPYC 9V74 / Xeon 8573C observed, ~±30%
      # apart) and every leg draws its own machine. Record which model ran THIS leg so the
      # Bencher upload can file results under a per-CPU testbed -- per-benchmark thresholds
      # then learn each CPU's population separately instead of swallowing the fleet spread.
      - name: Record runner CPU model
        run: |
          mkdir -p src/Copse.Benchmarks/artifacts/${{ matrix.category }}
          grep -m1 'model name' /proc/cpuinfo | cut -d: -f2- \
            | sed -E 's/\((R|TM)\)//gi' \
            | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9\n' '-' | tr -s '-' | sed 's/^-//; s/-$//' \
            > src/Copse.Benchmarks/artifacts/${{ matrix.category }}/cpu.txt
          echo "Runner CPU: $(cat src/Copse.Benchmarks/artifacts/${{ matrix.category }}/cpu.txt)"

      - name: Run ${{ matrix.category }} benchmarks
        run: |
          cd src/Copse.Benchmarks
          dotnet run -c Release --no-build -- --exporters json --allCategories ${{ matrix.category }} --artifacts ./artifacts/${{ matrix.category }} --join

      - name: Upload ${{ matrix.category }} results
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.category }}
          path: src/Copse.Benchmarks/artifacts/${{ matrix.category }}/
          retention-days: 30

  # Single publisher: reassembles the legs' artifacts, then stores to gh-pages and Bencher
  # sequentially (gh-pages writes must not race).
  publish:
    name: Publish results
    needs: run
    runs-on: ubuntu-latest
    # Surfaced as an env var so the Bencher steps can gate on its presence: the `secrets` context
    # is not available in a step-level `if:`, but `env` is. Empty until the BENCHER_API_KEY repo
    # secret is added, at which point the Bencher steps at the end activate. The gh-pages dashboard
    # is entirely unaffected either way.
    env:
      BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create gh-pages branch if it doesn't exist
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages branch doesn't exist, creating it..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout main
            git branch -D gh-pages
          else
            echo "gh-pages branch already exists"
          fi

      - name: Download benchmark results
        uses: actions/download-artifact@v7
        with:
          path: src/Copse.Benchmarks/artifacts/

      - name: Find results and create memory benchmarks
        id: find-results
        run: |
          for category in Traversal VisitStream Query Streaming Merge Buffer Aggregate Serialization DataStructures AsyncOverhead; do
            # Find the runtime benchmark JSON file
            RESULTS_FILE=$(find src/Copse.Benchmarks/artifacts/$category/results -name "*-report-full-compressed.json" -type f | head -n 1)
            echo "${category,,}_file=$RESULTS_FILE" >> $GITHUB_OUTPUT
            echo "Found $category results: $RESULTS_FILE"

            # Create memory benchmark JSON from the results
            if [ -f "$RESULTS_FILE" ]; then
              MEMORY_FILE="src/Copse.Benchmarks/artifacts/$category/results/memory-benchmarks.json"
              jq '[.Benchmarks[] | {name: .FullName, unit: "bytes", value: (.Memory.BytesAllocatedPerOperation // 0)}]' "$RESULTS_FILE" > "$MEMORY_FILE"
              echo "Created memory benchmark file: $MEMORY_FILE"
            fi
          done

      # Ensure no local gh-pages exists so benchmark action can fetch cleanly
      - name: Clean local gh-pages state
        run: |
          git branch -D gh-pages 2>/dev/null || true
          git update-ref -d refs/heads/gh-pages 2>/dev/null || true

      # Store results for each family -- MAIN ONLY: the gh-pages dashboard is main's trend
      # line, so dispatch runs against feature branches must not append to it (their numbers
      # live in the run artifacts and in Bencher, which files them under the branch name).
      # The FIRST store fetches gh-pages; the rest skip the fetch; the LAST store auto-pushes
      # all accumulated results at once.
      - name: Store Traversal benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Traversal Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.traversal_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store VisitStream benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: VisitStream Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.visitstream_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Query benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Query Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.query_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Streaming benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Streaming Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.streaming_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Merge benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Merge Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.merge_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Buffer benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Buffer Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.buffer_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Aggregate benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Aggregate Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.aggregate_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Serialization benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Serialization Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.serialization_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store DataStructures benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: DataStructures Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.datastructures_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store AsyncOverhead benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: AsyncOverhead Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.asyncoverhead_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      # Store memory benchmark results for each family
      - name: Store Traversal memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Traversal Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Traversal/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store VisitStream memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: VisitStream Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/VisitStream/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Query memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Query Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Query/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Streaming memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Streaming Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Streaming/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Merge memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Merge Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Merge/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Buffer memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Buffer Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Buffer/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Aggregate memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Aggregate Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Aggregate/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Serialization memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Serialization Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Serialization/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store DataStructures memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: DataStructures Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/DataStructures/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      # Final benchmark-action step: auto-push commits all accumulated family results at once.
      - name: Store AsyncOverhead memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: AsyncOverhead Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/AsyncOverhead/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      # --- Bencher (continuous-benchmarking SaaS), running side-by-side with the gh-pages
      # dashboard. It reads the SAME BenchmarkDotNet JSON the github-action-benchmark steps
      # above consume, so it is purely additive: it never writes benchmarks/data.js and never
      # touches the custom dashboard. Placed AFTER the gh-pages storage steps so that a Bencher
      # failure (bad project slug, API hiccup) can't break the dashboard push. The whole block
      # no-ops until the BENCHER_API_KEY repo secret exists. ---
      - name: Install Bencher CLI
        if: ${{ env.BENCHER_API_KEY != '' }}
        uses: bencherdev/bencher@main

      - name: Upload results to Bencher
        if: ${{ env.BENCHER_API_KEY != '' }}
        env:
          # Set a BENCHER_PROJECT repo variable to your Bencher project slug. Defaults to the
          # repo name if unset -- change this or the variable so the two match.
          BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT || 'copse-dotnet' }}
        run: |
          set -euo pipefail
          # One report per family, filed under a PER-CPU-MODEL testbed (recorded by each leg):
          # shared runners are a CPU lottery, and per-CPU testbeds let Bencher's per-benchmark
          # thresholds learn each machine model's population separately -- a fleet change shows
          # up as a new testbed, not a fake regression. Cross-family absolute comparisons were
          # never meaningful on shared runners anyway (every leg is a different machine);
          # within-family ratios (the AsyncOverhead pairs) are the trustworthy numbers, and
          # those always share a leg.
          for category in Traversal VisitStream Query Streaming Merge Buffer Aggregate Serialization DataStructures AsyncOverhead; do
            FILE=$(find "src/Copse.Benchmarks/artifacts/$category/results" -name "*-report-full-compressed.json" -type f | head -n 1)
            if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
              echo "::warning::No Bencher results file for $category; skipping."
              continue
            fi
            TESTBED=$(cat "src/Copse.Benchmarks/artifacts/$category/cpu.txt" 2>/dev/null || true)
            TESTBED=${TESTBED:-ubuntu-latest}
            # Convert to Bencher Metric Format keyed by BenchmarkDotNet's FullName. The
            # c_sharp_dot_net adapter names benchmarks Namespace.Method -- it DROPS the class --
            # so every same-named method across classes merged into one Bencher series (all
            # seven AsyncOverhead Sync/Async pairs became TWO series; Bft_Triangle mixed seven
            # families) and every threshold learned a meaningless mixed population. FullName
            # keeps the class (Copse.Benchmarks.Traversal.Dft_Binary): one series per real row.
            # Latency only; value +- one standard deviation.
            BMF="src/Copse.Benchmarks/artifacts/$category/bencher-bmf.json"
            jq '[.Benchmarks[] | select(.Statistics != null) | {(.FullName): {latency: {
                  value: .Statistics.Mean,
                  lower_value: (.Statistics.Mean - .Statistics.StandardDeviation),
                  upper_value: (.Statistics.Mean + .Statistics.StandardDeviation)}}}]
                | add // {}' "$FILE" > "$BMF"
            echo "Uploading $category -> Bencher ($(jq 'length' "$BMF") rows from $FILE) on testbed $TESTBED"
            bencher run \
              --project "$BENCHER_PROJECT" \
              --key "$BENCHER_API_KEY" \
              --branch "$GITHUB_REF_NAME" \
              --testbed "$TESTBED" \
              --adapter json \
              --file "$BMF" \
              --threshold-measure latency \
              --threshold-test t_test \
              --threshold-max-sample-size 64 \
              --threshold-upper-boundary 0.98 \
              --thresholds-reset
          done
          # Note: no --error-on-alert flag, so an alert is reported but does NOT fail the build
          # during the trial. Add --error-on-alert once you trust the thresholds and want
          # regressions to block main. Early runs won't alert until each benchmark has a few
          # samples of history to compare against.
