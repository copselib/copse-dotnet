name: Continuous Benchmarking

on:
  push:
    branches:
      - main
    # Dashboard-only changes are deployed by deploy-dashboard.yml; re-measuring nothing helps
    # no one.
    paths-ignore:
      - 'benchmark-dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  # Manual runs against any branch (pick the branch in the Run workflow dropdown): the pre-merge
  # "see the numbers first" path. Bencher files results under the actual branch name, so feature
  # runs never pollute main's history (Bencher handles feature-branch baselines natively).
  workflow_dispatch:

# Ensure only one benchmark PUBLISH at a time to prevent gh-pages conflicts (the matrix legs
# are safely concurrent; only the publish job touches gh-pages).
concurrency:
  group: benchmarks
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write

jobs:
  # One leg per category, in parallel. IMPORTANT: benchmarks that must be COMPARED to each other
  # (the AsyncOverhead sync/async pairs especially) live in the SAME category and therefore the
  # same leg -- same-run ratios are the only trustworthy numbers on shared runners; splitting a
  # comparison across runners would compare two different machines.
  run:
    name: Run ${{ matrix.category }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: [Traversal, LINQ, Conversion, DataStructures, Serialization, AsyncOverhead]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Copse.sln

      - name: Build benchmarks
        run: dotnet build src/Copse.Benchmarks/Copse.Benchmarks.csproj -c Release --no-restore

      - name: Run ${{ matrix.category }} benchmarks
        run: |
          cd src/Copse.Benchmarks
          dotnet run -c Release --no-build -- --exporters json --allCategories ${{ matrix.category }} --artifacts ./artifacts/${{ matrix.category }} --join

      - name: Upload ${{ matrix.category }} results
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.category }}
          path: src/Copse.Benchmarks/artifacts/${{ matrix.category }}/
          retention-days: 30

  # Single publisher: reassembles the legs' artifacts, then stores to gh-pages and Bencher
  # sequentially (gh-pages writes must not race).
  publish:
    name: Publish results
    needs: run
    runs-on: ubuntu-latest
    # Surfaced as an env var so the Bencher steps can gate on its presence: the `secrets` context
    # is not available in a step-level `if:`, but `env` is. Empty until the BENCHER_API_KEY repo
    # secret is added, at which point the Bencher steps at the end activate. The gh-pages dashboard
    # is entirely unaffected either way.
    env:
      BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create gh-pages branch if it doesn't exist
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages branch doesn't exist, creating it..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout main
            git branch -D gh-pages
          else
            echo "gh-pages branch already exists"
          fi

      - name: Download benchmark results
        uses: actions/download-artifact@v7
        with:
          path: src/Copse.Benchmarks/artifacts/

      - name: Find results and create memory benchmarks
        id: find-results
        run: |
          for category in Traversal LINQ Conversion DataStructures Serialization AsyncOverhead; do
            # Find the runtime benchmark JSON file
            RESULTS_FILE=$(find src/Copse.Benchmarks/artifacts/$category/results -name "*-report-full-compressed.json" -type f | head -n 1)
            echo "${category,,}_file=$RESULTS_FILE" >> $GITHUB_OUTPUT
            echo "Found $category results: $RESULTS_FILE"

            # Create memory benchmark JSON from the results
            if [ -f "$RESULTS_FILE" ]; then
              MEMORY_FILE="src/Copse.Benchmarks/artifacts/$category/results/memory-benchmarks.json"
              jq '[.Benchmarks[] | {name: .FullName, unit: "bytes", value: (.Memory.BytesAllocatedPerOperation // 0)}]' "$RESULTS_FILE" > "$MEMORY_FILE"
              echo "Created memory benchmark file: $MEMORY_FILE"
            fi
          done

      # Ensure no local gh-pages exists so benchmark action can fetch cleanly
      - name: Clean local gh-pages state
        run: |
          git branch -D gh-pages 2>/dev/null || true
          git update-ref -d refs/heads/gh-pages 2>/dev/null || true

      # Store results for each category -- MAIN ONLY: the gh-pages dashboard is main's trend
      # line, so dispatch runs against feature branches must not append to it (their numbers
      # live in the run artifacts and in Bencher, which files them under the branch name).
      # The FIRST store fetches gh-pages; the rest skip the fetch; the LAST store auto-pushes
      # all accumulated results at once.
      - name: Store Traversal benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Traversal Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.traversal_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store LINQ benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: LINQ Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.linq_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Conversion benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Conversion Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.conversion_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store DataStructures benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: DataStructures Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.datastructures_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Serialization benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Serialization Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.serialization_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store AsyncOverhead benchmark results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: AsyncOverhead Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: ${{ steps.find-results.outputs.asyncoverhead_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      # Store memory benchmark results for each category
      - name: Store Traversal memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Traversal Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Traversal/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store LINQ memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: LINQ Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/LINQ/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Conversion memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Conversion Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Conversion/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store DataStructures memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: DataStructures Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/DataStructures/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      - name: Store Serialization memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Serialization Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/Serialization/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      # Final benchmark-action step: auto-push commits all accumulated category results at once.
      - name: Store AsyncOverhead memory results
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: AsyncOverhead Memory
          tool: 'customSmallerIsBetter'
          output-file-path: src/Copse.Benchmarks/artifacts/AsyncOverhead/results/memory-benchmarks.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          skip-fetch-gh-pages: true
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

      # --- Bencher (continuous-benchmarking SaaS), running side-by-side with the gh-pages
      # dashboard as a trial. It reads the SAME BenchmarkDotNet JSON the github-action-benchmark
      # steps above consume, so it is purely additive: it never writes benchmarks/data.js and never
      # touches the custom dashboard. Placed AFTER the gh-pages storage steps so that a Bencher
      # failure (bad project slug, API hiccup) can't break the dashboard push. The whole block
      # no-ops until the BENCHER_API_KEY repo secret exists. ---
      - name: Install Bencher CLI
        if: ${{ env.BENCHER_API_KEY != '' }}
        uses: bencherdev/bencher@main

      - name: Upload results to Bencher
        if: ${{ env.BENCHER_API_KEY != '' }}
        env:
          # Set a BENCHER_PROJECT repo variable to your Bencher project slug. Defaults to the
          # repo name if unset -- change this or the variable so the two match.
          BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT || 'copse-dotnet' }}
        run: |
          set -euo pipefail
          # One report per category, all on the same branch/testbed/commit. The testbed name
          # records that these ran on a shared GitHub runner -- Bencher's per-benchmark thresholds
          # (below) learn each benchmark's own historical spread on THIS testbed, which is how a
          # noisy runner is handled without a dedicated machine. NOTE: each category leg ran on a
          # DIFFERENT runner instance; cross-category absolute comparisons were never meaningful
          # on shared runners anyway -- within-category ratios (the AsyncOverhead pairs) are the
          # trustworthy numbers, and those always share a leg.
          for category in Traversal LINQ Conversion DataStructures Serialization AsyncOverhead; do
            FILE=$(find "src/Copse.Benchmarks/artifacts/$category/results" -name "*-report-full-compressed.json" -type f | head -n 1)
            if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
              echo "::warning::No Bencher results file for $category; skipping."
              continue
            fi
            echo "Uploading $category -> Bencher ($FILE)"
            bencher run \
              --project "$BENCHER_PROJECT" \
              --key "$BENCHER_API_KEY" \
              --branch "$GITHUB_REF_NAME" \
              --testbed ubuntu-latest \
              --adapter c_sharp_dot_net \
              --file "$FILE" \
              --threshold-measure latency \
              --threshold-test t_test \
              --threshold-max-sample-size 64 \
              --threshold-upper-boundary 0.95 \
              --thresholds-reset
          done
          # Note: no --error-on-alert flag, so an alert is reported but does NOT fail the build
          # during the trial. Add --error-on-alert once you trust the thresholds and want
          # regressions to block main. Early runs won't alert until each benchmark has a few
          # samples of history to compare against.
